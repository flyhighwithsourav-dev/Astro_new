name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab
jobs:
  build-android:
    name: Build Android App (.apk)
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4
      # 2. Set up Node.js for building the Astro web assets
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # 3. Install NPM dependencies
      - name: Install Dependencies
        run: npm install
      # 4. Compile the Astro project into static HTML/CSS/JS (dist/ directory)
      - name: Build Astro Web Assets
        run: npm run build
      # 5. Sync compiled assets into the native Android Capacitor folder
      - name: Sync Capacitor Web Assets
        run: npx cap sync
      # 6. Set up Java JDK 17 (required for modern Android builds/Gradle)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'
      # 7. Make the Gradle wrapper executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew
      # 8. Compile the debug APK using Gradle
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
      # 9. Upload the resulting APK as a build artifact
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-astrologer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
